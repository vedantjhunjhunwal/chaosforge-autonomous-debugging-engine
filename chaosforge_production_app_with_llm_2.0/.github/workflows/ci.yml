name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python -m chaosforge.db.init_db
      - run: pytest -q
      - run: python apps.py run --contract contracts/python_demo.json --runs 3 --concurrency 2 --no-auth
